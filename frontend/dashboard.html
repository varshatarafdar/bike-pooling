<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BikePool Dashboard X</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* ================= BACKGROUND ================= */
body {
  margin:0;
  font-family:Poppins;
  background: linear-gradient(-45deg,#000,#111,#1a1a1a,#FFD700);
  background-size:400% 400%;
  animation:bg 12s infinite;
  color:white;
}

@keyframes bg {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ================= NAVBAR ================= */
.navbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:0 0 20px 20px;
}

/* ================= MAP ================= */
.map-container {
  height:60vh;
  margin:15px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(255,215,0,0.2);
  animation: fadeIn 1s ease;
}

#map {
  height:100%;
  width:100%;
}

@keyframes fadeIn {
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

/* ================= STATUS ================= */
.status {
  margin:10px auto;
  text-align:center;
  padding:10px;
  width:90%;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0%{box-shadow:0 0 5px #FFD700;}
  50%{box-shadow:0 0 20px #FFD700;}
  100%{box-shadow:0 0 5px #FFD700;}
}

/* ================= BOTTOM PANEL ================= */
.bottom-sheet {
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  animation: slideUp 0.8s ease;
}

@keyframes slideUp {
  from{transform:translateY(30px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* ================= INPUT ================= */
.input-group {
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.1);
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

input {
  width:100%;
  border:none;
  background:none;
  color:white;
  outline:none;
}

/* ================= BUTTONS ================= */
button {
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.primary-btn {
  background:#FFD700;
}

.primary-btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #FFD700;
}

.secondary-btn {
  background:#222;
  color:white;
}

.secondary-btn:hover {
  transform:scale(1.05);
}

/* ================= DROPDOWN ================= */
.dropdown {
  background:#111;
  border-radius:10px;
  margin-top:5px;
  max-height:150px;
  overflow:auto;
}

.dropdown-item {
  padding:10px;
  cursor:pointer;
}

.dropdown-item:hover {
  background:#222;
}

/* ================= TOAST ================= */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}

</style>

</head>

<body>

<!-- ================= NAV ================= -->
<header class="navbar">
  <div>🚲 BikePool</div>

  <div>
    <i class="fas fa-moon"></i>
  </div>
</header>

<!-- ================= MAP ================= -->
<div class="map-container">
  <div id="map"></div>
</div>

<!-- ================= STATUS ================= -->
<div id="statusBox" class="status">
  📍 Tap map or search location
</div>

<!-- ================= PANEL ================= -->
<div class="bottom-sheet">

  <h3>🚀 Plan Your Ride</h3>

  <div class="input-group">
    <i class="fas fa-map-marker-alt"></i>
    <input id="start" placeholder="Pickup location">
  </div>
  <div id="pickupDropdown" class="dropdown"></div>

  <div class="input-group">
    <i class="fas fa-flag"></i>
    <input id="destination" placeholder="Drop location">
  </div>
  <div id="dropDropdown" class="dropdown"></div>

  <div class="input-group">
    <i class="fas fa-clock"></i>
    <input id="time" type="time">
  </div>

  <button class="primary-btn" onclick="handleBooking()">
    🚀 Book Ride
  </button>

  <button class="secondary-btn" onclick="goTo('view_matches.html')">
    🔍 Live Matches
  </button>

</div>

<div id="toast"></div>

<script src="js/app.js"></script>

<script>

/* ================= MAP ================= */
let map = L.map('map').setView([18.52,73.85], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let pickupMarker, dropMarker;

/* ================= CLICK ================= */
map.on('click', e => {

  let {lat,lng} = e.latlng;

  if(!pickupMarker){
    pickupMarker = L.marker([lat,lng]).addTo(map);
    localStorage.setItem("start_lat", lat);
    localStorage.setItem("start_lng", lng);
    showToast("Pickup selected");
  } else {
    dropMarker = L.marker([lat,lng]).addTo(map);
    localStorage.setItem("dest_lat", lat);
    localStorage.setItem("dest_lng", lng);
    showToast("Destination selected");
  }

});

/* ================= BOOK ================= */
function handleBooking(){

  document.getElementById("statusBox").innerText = "🔍 Finding riders...";

  addRide();

  setTimeout(()=> {
    showToast("Searching system...");
  },500);

}

</script>

</body>
</html>
