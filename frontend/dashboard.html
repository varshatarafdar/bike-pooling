
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BikePool Dashboard</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* 🔥 BACKGROUND */
body {
  margin:0;
  font-family:Poppins;
  background: linear-gradient(-45deg,#000,#111,#1a1a1a,#FFD700);
  background-size:400% 400%;
  animation:bg 12s infinite;
  color:white;
}

@keyframes bg {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 🌍 MAP */
.map-container {
  height:60vh;
  margin:15px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(255,215,0,0.2);
}

/* 📍 STATUS */
.status {
  text-align:center;
  margin:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0%{box-shadow:0 0 5px #FFD700;}
  50%{box-shadow:0 0 20px #FFD700;}
  100%{box-shadow:0 0 5px #FFD700;}
}

/* 🔥 PANEL */
.bottom-sheet {
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  animation:slideUp 0.6s ease;
}

@keyframes slideUp {
  from{transform:translateY(30px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* INPUT */
.input-group {
  display:flex;
  align-items:center;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
}

.input-group input {
  border:none;
  background:none;
  color:white;
  width:100%;
  outline:none;
}

/* BUTTON */
.primary-btn, .secondary-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.primary-btn {
  background:#FFD700;
}

.primary-btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px #FFD700;
}

.secondary-btn {
  background:#222;
  color:white;
}

/* DROPDOWN */
.dropdown {
  background:#111;
  border-radius:10px;
  max-height:150px;
  overflow:auto;
}

.dropdown-item {
  padding:10px;
  cursor:pointer;
}

.dropdown-item:hover {
  background:#222;
}

/* TOAST (IMPROVED) */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  padding:12px 20px;
  border-radius:10px;
  display:none;
  animation:fadeIn 0.3s ease;
  z-index:9999;
}

@keyframes fadeIn {
  from{opacity:0; transform:translate(-50%,20px);}
  to{opacity:1; transform:translate(-50%,0);}
}
.matches-panel{
  margin:15px;
  padding:15px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  display:none;
}

.match-card{
  background:rgba(255,255,255,0.1);
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  animation:fadeIn 0.5s ease;
}

.badge{
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  background:#FFD700;
  color:black;
}

/* 🎉 POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#111;
  padding:20px;
  border-radius:20px;
  text-align:center;
  z-index:9999;
  transition:0.3s;
}

.popup.show{
  transform:translate(-50%,-50%) scale(1);
}
</style>

</head>

<body>

<!-- ✅ NAVBAR -->
<div id="navbar"></div>

<!-- 🌍 MAP -->
<div class="map-container">
  <div id="map" style="height:100%"></div>
</div>

<!-- 📍 STATUS -->
<div id="statusBox" class="status">
  📍 Select Pickup & Destination
</div>

<!-- 🔥 PANEL -->
<div class="bottom-sheet">

  <h3>🚀 Plan Your Ride</h3>

  <div class="input-group">
    <i class="fas fa-map-marker-alt"></i>
    <input id="start" placeholder="Pickup location">
  </div>
  <div id="pickupDropdown" class="dropdown"></div>

  <div class="input-group">
    <i class="fas fa-flag"></i>
    <input id="destination" placeholder="Drop location">
  </div>
  <div id="dropDropdown" class="dropdown"></div>

  <div class="input-group">
    <i class="fas fa-clock"></i>
    <input id="time" type="time">
  </div>

  <button class="primary-btn" onclick="handleBooking()">
    🚀 Book Ride
  </button>

  <button class="secondary-btn" onclick="loadMatches()">
    🔍 Live Matches
  </button>

</div>
<!-- 🔥 MATCH RESULTS -->
<div id="matchesPanel" class="matches-panel">
  <h3>🚲 Nearby Riders</h3>
  <div id="matchesContainer"></div>
</div>

<!-- 🎉 POPUP -->
<div id="popup" class="popup">
  <h2>🎉 Ride Booked!</h2>
  <p>Finding best match...</p>
</div>
<div id="toast"></div>

<script src="js/app.js"></script>

<script>
/* AUTH */
if(!localStorage.getItem("token")){
  window.location.href="login.html";
}

/* MAP */
let map = L.map('map').setView([18.52,73.85], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let pickupMarker = null;
let dropMarker = null;

/* CLICK */
map.on('click', async e => {

  let {lat,lng} = e.latlng;

  let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
  let data = await res.json();

  let address = data.display_name;

  if(!pickupMarker){
    pickupMarker = L.marker([lat,lng]).addTo(map);
    document.getElementById("start").value = address;
    localStorage.setItem("start_lat", lat);
    localStorage.setItem("start_lng", lng);
  } else {
    dropMarker = L.marker([lat,lng]).addTo(map);
    document.getElementById("destination").value = address;
    localStorage.setItem("dest_lat", lat);
    localStorage.setItem("dest_lng", lng);
  }

});

/* BOOK RIDE */
async function handleBooking(){

  let start = document.getElementById("start").value.trim();
  let dest = document.getElementById("destination").value.trim();
  let time = document.getElementById("time").value;

  let start_lat = parseFloat(localStorage.getItem("start_lat"));
  let start_lng = parseFloat(localStorage.getItem("start_lng"));
  let dest_lat = parseFloat(localStorage.getItem("dest_lat"));
  let dest_lng = parseFloat(localStorage.getItem("dest_lng"));

  if(!start || !dest || !time){
    showToast("⚠️ Fill all fields");
    return;
  }

  if(isNaN(start_lat) || isNaN(dest_lat)){
    showToast("📍 Select pickup & destination on map");
    return;
  }

  try{

    let data = await createRideAPI({
      start: start,
      destination: dest,
      start_lat: start_lat,
      start_lng: start_lng,
      dest_lat: dest_lat,
      dest_lng: dest_lng,
      time: time
    });

    if(data){

      localStorage.setItem("ride_id", data.ride_id);

      showPopup();
      showToast("🎉 Ride Booked Successfully");

      // stay on dashboard (as you want)
      // but still check for auto match
      autoMatch();
    }

  }catch(err){
    console.error(err);
    showToast("Server error ❌");
  }
}
/* 🎉 POPUP */
function showPopup(){
  let popup = document.getElementById("popup");
  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  },2000);
}

/* 🔍 LOAD MATCHES */
async function loadMatches(){

  let panel = document.getElementById("matchesPanel");
  let container = document.getElementById("matchesContainer");

  panel.style.display="block";
  container.innerHTML="🔄 Searching nearby riders...";

  try{

    let data = await getMatchesAPI();

    container.innerHTML="";

    if(!data || !data.matches || data.matches.length===0){
      container.innerHTML="❌ No matches found";
      return;
    }

    data.matches.forEach(m=>{

      let div = document.createElement("div");
      div.className="match-card";

      div.innerHTML = `
        <h4>
          ${m.name}
          ${m.has_bike ? '<span class="badge">🚗 Driver</span>' : '<span class="badge">🧍 Rider</span>'}
        </h4>
        <p>📍 ${m.start_location} → ${m.destination}</p>
        <p>📏 Pickup Distance: ${m.pickup_distance.toFixed(2)} km</p>
        <p>📏 Drop Distance: ${m.drop_distance.toFixed(2)} km</p>
        <p>⏱ ${m.ride_time}</p>

        <button onclick="requestRide(${m.user_id}, ${m.id})"
          class="primary-btn">
          🤝 Request Pool
        </button>
      `;

      container.appendChild(div);
    });

  }catch(err){
    console.error(err);
    container.innerHTML="❌ Error loading matches";
  }
}
// 🔥 AUTO MATCH (POLLING)
function autoMatch(){

  let interval = setInterval(async () => {

    try{

      let data = await checkMatchAPI();

      if(data && data.match_found){

        clearInterval(interval);

        showToast("🎉 Match Found!");

        setTimeout(()=>{
          window.location.href = "active_ride.html";
        },1200);
      }

    }catch{
      console.log("match error");
    }

  }, 3000);
}

async function requestRide(userId, rideId){

  try{

    let res = await createBookingAPI({
      driver_id: userId,
      ride_id: rideId
    });

    if(res){
      showToast("🎉 Ride Requested!");
    }

  }catch{
    showToast("Error requesting ride");
  }
}
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(()=>{
    t.style.display = "none";
  },2500);
}
function resetMapSelection(){
  if(pickupMarker){
    map.removeLayer(pickupMarker);
    pickupMarker = null;
  }
  if(dropMarker){
    map.removeLayer(dropMarker);
    dropMarker = null;
  }

  localStorage.removeItem("start_lat");
  localStorage.removeItem("start_lng");
  localStorage.removeItem("dest_lat");
  localStorage.removeItem("dest_lng");

  document.getElementById("start").value = "";
  document.getElementById("destination").value = "";

  document.getElementById("statusBox").innerText =
    "📍 Select Pickup & Destination";
}
</script>

</body>
</html>
