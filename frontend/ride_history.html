<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ride History - BikePool</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
.stats {
  display: flex;
  justify-content: space-around;
  margin: 10px;
}

.stat-box {
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}

.star {
  cursor: pointer;
  font-size: 18px;
}
</style>

</head>

<body class="fade">

<div class="bg-gradient"></div>

<!-- 🔝 NAVBAR -->
<header class="navbar glass">
  <div class="logo">📜 Ride History</div>

  <div class="nav-actions">
    <button class="icon-btn ripple" onclick="goTo('dashboard.html')">
      <i class="fas fa-home"></i>
    </button>

    <button class="icon-btn ripple" onclick="goTo('profile.html')">
      <i class="fas fa-user"></i>
    </button>
  </div>
</header>

<!-- 📊 STATS -->
<div class="stats glass">
  <div class="stat-box">
    <h3 id="totalRides">0</h3>
    <p>Rides</p>
  </div>
  <div class="stat-box">
    <h3 id="totalSpent">₹0</h3>
    <p>Spent</p>
  </div>
</div>

<!-- 📦 HISTORY -->
<div id="historyContainer" class="history-container">

  <!-- LOADING -->
  <div class="card glass" id="loadingBox">
    <h3>⏳ Loading rides...</h3>
  </div>

  <!-- EMPTY -->
  <div class="card glass hidden" id="emptyState">
    <h3>🚲 No rides yet</h3>
    <p>Start your first ride 🚀</p>
    <button class="primary-btn" onclick="goTo('dashboard.html')">Book Ride</button>
  </div>

</div>

<!-- 🔔 TOAST -->
<div id="toast"></div>

<!-- 🔽 NAV -->
<div class="bottom-nav glass">
  <button onclick="goTo('dashboard.html')">🏠</button>
  <button onclick="goTo('view_matches.html')">🔍</button>
  <button onclick="goTo('add_ride.html')">➕</button>
  <button onclick="goTo('active_ride.html')">🚲</button>
</div>

<script src="js/app.js"></script>

<script>

const API = "http://127.0.0.1:5000";

/* =========================
   🚀 LOAD HISTORY
========================= */
async function loadHistory(){

  let token = localStorage.getItem("token");

  if(!token){
    window.location.href = "login.html";
    return;
  }

  try{

    let res = await fetch(`${API}/ride_history`, {
      headers: { "Authorization": token }
    });

    let data = await res.json();

    let container = document.getElementById("historyContainer");
    let empty = document.getElementById("emptyState");

    document.getElementById("loadingBox").style.display = "none";
    container.innerHTML = "";

    if(!data.history || data.history.length === 0){
      empty.classList.remove("hidden");
      container.appendChild(empty);
      return;
    }

    let total = 0;

    data.history.forEach((ride, i) => {

      total += ride.fare || 0;

      let card = document.createElement("div");
      card.className = "ride-card glass animate-pop";

      card.innerHTML = `
        <h3>📍 ${ride.start_location} → ${ride.destination}</h3>
        <p>⏱ ${ride.time}</p>
        <p>💰 ₹${ride.fare || 40}</p>
        <p>📊 Status: <span style="color:#00ffcc">${ride.status}</span></p>

        <div>
          ⭐ Rate:
          ${generateRatingUI(ride.rating || 0, ride.booking_id)}
        </div>
      `;

      container.appendChild(card);

    });

    // 📊 UPDATE STATS
    document.getElementById("totalRides").innerText = data.history.length;
    document.getElementById("totalSpent").innerText = "₹" + total;

  }catch{
    showToast("Error loading history ❌");
  }
}

/* =========================
   ⭐ RATING UI
========================= */
function generateRatingUI(current, id){

  let stars = "";

  for(let i=1;i<=5;i++){
    stars += `<span class="star" onclick="rateRide(${id},${i})">
                ${i <= current ? "⭐" : "☆"}
              </span>`;
  }

  return stars;
}

/* =========================
   ⭐ RATE RIDE
========================= */
async function rateRide(id, rating){

  let token = localStorage.getItem("token");

  await fetch(`${API}/rate_ride`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ booking_id: id, rating })
  });

  showToast("⭐ Rated successfully");
  loadHistory();
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", loadHistory);

</script>

</body>
</html>
