<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Active Ride - BikePool</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f0f0f;
  color:white;
}

/* MAP */
#map{
  height:60vh;
}

/* CARD */
.card{
  margin:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#FFD700;
  font-weight:bold;
  cursor:pointer;
}

/* STATUS */
.status{
  text-align:center;
  margin:10px;
  padding:10px;
  border-radius:10px;
  background:#222;
}
</style>

</head>
<body>

<div id="map"></div>

<div class="status" id="statusBox">🔄 Loading ride...</div>

<div class="card">
  <h3>👤 Driver</h3>
  <p id="driver"></p>

  <h3>🧍 Passenger</h3>
  <p id="passenger"></p>

  <h3>📞 Contact</h3>
  <p id="phone"></p>
</div>

<div class="card">
  <button onclick="updateStatus('accepted')">✅ Accept</button>
  <button onclick="updateStatus('arriving')">🚗 Arriving</button>
  <button onclick="updateStatus('started')">▶ Start Ride</button>
  <button onclick="updateStatus('completed')">🏁 Complete</button>
</div>

<script>

const API = "http://127.0.0.1:5000";

let map;
let bookingData;

/* INIT */
document.addEventListener("DOMContentLoaded", async () => {
  initMap();
  loadBooking();
});

/* MAP */
function initMap(){
  map = L.map("map").setView([20.59,78.96], 5);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
  .addTo(map);
}

/* LOAD ACTIVE BOOKING */
async function loadBooking(){

  try{

    let res = await fetch(API + "/pool_status", {
      headers:{
        "Authorization":"Bearer " + localStorage.getItem("token")
      }
    });

    let data = await res.json();

    if(!data.booking){
      document.getElementById("statusBox").innerText = "❌ No Active Ride";
      return;
    }

    bookingData = data.booking;

    document.getElementById("driver").innerText =
      bookingData.driver_name || "N/A";

    document.getElementById("passenger").innerText =
      bookingData.passenger_name || "N/A";

    document.getElementById("phone").innerText =
      "Driver ID: " + bookingData.driver_id + " | Passenger ID: " + bookingData.passenger_id;

    document.getElementById("statusBox").innerText =
      "🚦 Status: " + bookingData.status;

    drawRoute();

  }catch(err){
    console.log(err);
    document.getElementById("statusBox").innerText = "⚠️ Error loading ride";
  }
}

/* DRAW ROUTE */
function drawRoute(){

  if(!bookingData) return;

  let coords = [];

  if(bookingData.start_lat && bookingData.start_lng){
    coords.push([bookingData.start_lat, bookingData.start_lng]);
  }

  if(bookingData.dest_lat && bookingData.dest_lng){
    coords.push([bookingData.dest_lat, bookingData.dest_lng]);
  }

  if(coords.length < 2) return;

  let polyline = L.polyline(coords).addTo(map);

  map.fitBounds(polyline.getBounds());
}

/* UPDATE STATUS */
async function updateStatus(status){

  try{

    await fetch(API + "/update_status",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + localStorage.getItem("token")
      },
      body: JSON.stringify({
        booking_id: bookingData.id || bookingData.booking_id,
        status: status
      })
    });

    loadBooking();

  }catch(err){
    console.log(err);
    alert("Failed to update status");
  }
}

/* AUTO REFRESH */
setInterval(loadBooking, 5000);

</script>
</body>
</html>
