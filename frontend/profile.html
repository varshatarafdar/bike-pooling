<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - BikePool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body {
  background:#0f0f0f;
  color:white;
}

/* 🌈 Animated background */
.bg-gradient {
  position:fixed;
  width:200%;
  height:200%;
  background:linear-gradient(270deg,#00ffcc,#00ccff,#ff00cc,#ffcc00);
  background-size:800% 800%;
  animation:gradientMove 15s ease infinite;
  z-index:-1;
  opacity:0.15;
}

@keyframes gradientMove {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Glass UI */
.glass {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:16px;
  padding:20px;
}

/* Navbar */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  margin:10px;
}

.icon-btn {
  padding:10px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:none;
  cursor:pointer;
  color:white;
}

/* Layout */
.container {
  display:flex;
  justify-content:center;
  margin-top:30px;
}

.card {
  width:90%;
  max-width:420px;
  text-align:center;
}

/* Profile image */
.profile-img {
  width:90px;
  border-radius:50%;
  border:3px solid #00ffcc;
  margin-bottom:10px;
}

/* Input fields */
.input-group {
  display:flex;
  align-items:center;
  margin:12px 0;
  padding:12px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

.input-group i {
  margin-right:10px;
  color:#00ffcc;
}

.input-group input {
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:white;
}

/* Disabled style */
.input-group input:disabled {
  opacity:0.6;
}

/* Buttons */
.primary-btn, .secondary-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-weight:600;
}

.primary-btn {
  background:linear-gradient(45deg,#00ffcc,#00ccff);
}

.secondary-btn {
  background:#222;
  color:white;
  border:1px solid #333;
}

/* Toast */
#toast {
  position:fixed;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}

/* Loader */
.loader {
  border:4px solid #333;
  border-top:4px solid #00ffcc;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:15px auto;
}

.hidden {display:none;}

@keyframes spin {
  to {transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="bg-gradient"></div>

<!-- Navbar -->
<div class="navbar glass">
  <div>👤 Profile</div>
  <button class="icon-btn" onclick="go('dashboard.html')">
    <i class="fas fa-home"></i>
  </button>
</div>

<!-- Profile Card -->
<div class="container">
  <div class="card glass">

    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">

    <h3 id="username">Loading...</h3>

    <!-- Inputs -->
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input id="name" disabled>
    </div>

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input id="email" disabled>
    </div>

    <div class="input-group">
      <i class="fas fa-phone"></i>
      <input id="phone" disabled>
    </div>

    <div class="input-group">
      <i class="fas fa-motorcycle"></i>
      <label style="flex:1;text-align:left;">Has Bike</label>
      <input type="checkbox" id="has_bike" disabled>
    </div>

    <!-- Buttons -->
    <button class="secondary-btn" onclick="enableEdit()">✏️ Edit Profile</button>
    <button class="primary-btn" onclick="updateProfile()">💾 Save Changes</button>

    <div id="loader" class="loader hidden"></div>

  </div>
</div>

<div id="toast"></div>

<script>

const API = "http://127.0.0.1:5000/api";
const token = localStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}

/* 📥 Load Profile */
async function loadProfile(){
  loader(true);

  try{
    let res = await fetch(`${API}/profile`,{
      headers:{
        "Authorization":"Bearer " + token
      }
    });

    let data = await res.json();

    document.getElementById("username").innerText = data.name;
    document.getElementById("name").value = data.name;
    document.getElementById("email").value = data.email;
    document.getElementById("phone").value = data.phone;
    document.getElementById("has_bike").checked = data.has_bike;

  }catch(err){
    toast("⚠️ Failed to load profile");
  }

  loader(false);
}

/* ✏️ Enable Editing */
function enableEdit(){
  document.querySelectorAll("input").forEach(i=>{
    i.disabled = false;
  });
  toast("✏️ Edit mode enabled");
}

/* 💾 Update Profile */
async function updateProfile(){

  loader(true);

  let body = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    has_bike: document.getElementById("has_bike").checked
  };

  try{
    let res = await fetch(`${API}/profile`,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify(body)
    });

    if(res.ok){
      toast("✅ Profile Updated");

      // lock again after save
      document.querySelectorAll("input").forEach(i=>{
        i.disabled = true;
      });

      document.getElementById("username").innerText = body.name;
    } else {
      toast("❌ Update failed");
    }

  }catch(err){
    toast("❌ Server error");
  }

  loader(false);
}

/* 🍞 Toast */
function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* 🔄 Loader */
function loader(show){
  document.getElementById("loader").classList.toggle("hidden",!show);
}

/* 🏠 Navigation */
function go(page){
  window.location.href = page;
}

/* 🚀 Init */
loadProfile();

</script>

</body>
</html>
