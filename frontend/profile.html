<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - BikePool</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
.profile-img {
  width: 90px;
  border-radius: 50%;
  margin-bottom: 10px;
  border: 3px solid #00ffcc;
}

.edit-input {
  display: none;
  margin-top: 10px;
}

/* ===============================
   🌈 GLOBAL STYLES
=============================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f0f0f;
  color: white;
  overflow-x: hidden;
}

/* 🌗 DARK MODE */
body.dark {
  background: #000;
  color: #eee;
}

/* ===============================
   🌈 BACKGROUND GRADIENT
=============================== */
.bg-gradient {
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(270deg, #00ffcc, #00ccff, #ff00cc, #ffcc00);
  background-size: 800% 800%;
  animation: gradientMove 15s ease infinite;
  z-index: -1;
  opacity: 0.15;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===============================
   🧊 GLASS EFFECT
=============================== */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 16px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.2);
}

/* ===============================
   🧭 NAVBAR
=============================== */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  margin: 10px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.nav-actions {
  display: flex;
  gap: 10px;
}

/* ===============================
   🔘 BUTTONS
=============================== */
.primary-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg,#00ffcc,#00ccff);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.primary-btn:hover {
  transform: scale(1.05);
}

.secondary-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 2px solid #00ffcc;
  background: transparent;
  color: #00ffcc;
  cursor: pointer;
}

.icon-btn {
  padding: 10px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
}

/* ===============================
   🧾 INPUTS
=============================== */
.input-group {
  display: flex;
  align-items: center;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
}

.input-group input,
.input-group select {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  margin-left: 10px;
}

/* ===============================
   📦 BOTTOM SHEET
=============================== */
.bottom-sheet {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 20px;
  border-radius: 20px 20px 0 0;
}

/* ===============================
   📍 DROPDOWN
=============================== */
.dropdown {
  background: #111;
  border-radius: 10px;
  max-height: 150px;
  overflow-y: auto;
}

.dropdown-item {
  padding: 10px;
  cursor: pointer;
}

.dropdown-item:hover {
  background: #222;
}

/* ===============================
   🔄 LOADER
=============================== */
.loader {
  margin: 15px auto;
  border: 4px solid #ccc;
  border-top: 4px solid #00ffcc;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
}

.hidden {
  display: none;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===============================
   🔔 TOAST
=============================== */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 10px 20px;
  border-radius: 20px;
  display: none;
}

/* ===============================
   ✨ ANIMATIONS
=============================== */
.fade {
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.animate-pop {
  animation: pop 0.5s ease;
}

@keyframes pop {
  0% {transform:scale(0.8); opacity:0;}
  100% {transform:scale(1); opacity:1;}
}

/* ===============================
   📊 ADMIN CARDS
=============================== */
.card {
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  text-align: center;
}

.card h2 {
  font-size: 28px;
}

.card p {
  opacity: 0.7;
}
</style>

</head>

<body class="fade">

<div class="bg-gradient"></div>

<header class="navbar glass">
  <div class="logo">👤 Profile</div>

  <div class="nav-actions">
    <button class="icon-btn ripple" onclick="goTo('dashboard.html')">
      <i class="fas fa-home"></i>
    </button>
  </div>
</header>

<div class="auth-container">

  <div class="auth-card glass animate-pop">

    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
         class="profile-img">

    <h3 id="username">Loading...</h3>
    <p id="email">--</p>

    <!-- EDIT FIELD -->
    <div class="input-group edit-input" id="editBox">
      <i class="fas fa-user"></i>
      <input id="newName" placeholder="Enter new name">
    </div>

    <hr>

    <!-- BIKE MODE -->
    <div class="input-group">
      <i class="fas fa-motorcycle"></i>
      <label style="flex:1;">Driver Mode</label>
      <input type="checkbox" id="bikeToggle">
    </div>

    <!-- ACTION BUTTONS -->
    <div class="btn-group">

      <button class="primary-btn ripple" onclick="toggleEdit()">
        ✏️ Edit
      </button>

      <button class="secondary-btn ripple" onclick="logout()">
        🚪 Logout
      </button>

    </div>

    <div id="loader" class="loader hidden"></div>

  </div>

</div>

<div id="toast"></div>

<script src="js/app.js"></script>

<script>

const API = "http://127.0.0.1:5000";

/* ==============================
   🔐 AUTH CHECK
============================== */
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}

/* ==============================
   LOAD PROFILE
============================== */
async function loadProfile(){

  let loader = document.getElementById("loader");
  loader.classList.remove("hidden");

  try {
    let res = await fetch(`${API}/profile`, {
      headers: { "Authorization": localStorage.getItem("token") }
    });

    let data = await res.json();

    document.getElementById("username").innerText = data.name || "User";
    document.getElementById("email").innerText = data.email || "--";
    document.getElementById("bikeToggle").checked = data.has_bike;

  } catch {
    showToast("⚠️ Failed to load profile");
  }

  loader.classList.add("hidden");
}

/* ==============================
   🚲 UPDATE BIKE MODE
============================== */
document.getElementById("bikeToggle").addEventListener("change", async function(){

  await fetch(`${API}/update_bike`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({ has_bike: this.checked ? 1 : 0 })
  });

  showToast("🚲 Mode Updated");
});

/* ==============================
   ✏️ EDIT TOGGLE
============================== */
function toggleEdit(){

  let box = document.getElementById("editBox");

  if(box.style.display === "block"){
    updateProfile();
  } else {
    box.style.display = "block";
  }
}

/* ==============================
   💾 UPDATE PROFILE
============================== */
async function updateProfile(){

  let name = document.getElementById("newName").value.trim();

  if(!name){
    showToast("⚠️ Enter name");
    return;
  }

  let loader = document.getElementById("loader");
  loader.classList.remove("hidden");

  await fetch(`${API}/update_profile`, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body: JSON.stringify({ name })
  });

  loader.classList.add("hidden");

  showToast("✅ Profile Updated");

  document.getElementById("editBox").style.display = "none";
  document.getElementById("newName").value = "";

  loadProfile();
}

/* ==============================
   🚪 LOGOUT
============================== */
function logout(){
  localStorage.clear();
  showToast("Logged out 👋");

  setTimeout(()=>{
    window.location.href="login.html";
  }, 1000);
}

/* ==============================
   INIT
============================== */
document.addEventListener("DOMContentLoaded", loadProfile);

</script>

</body>
</html>
